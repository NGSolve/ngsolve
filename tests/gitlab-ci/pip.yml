pip_linux:
  image: cerbsim/manylinux_2_28_x86_64_cuda_12.9
  stage: build
  tags:
    - pip
    - linux
    - docker
  when: manual
  script:
    - ./tests/build_pip.sh

pip_macos:
  stage: build
  tags:
    - pip
    - macosx
    - m1
  when: manual
  script:
    - ./tests/build_pip_mac.sh

pip_windows:
  stage: build
  tags:
    - pip
    - windows
  when: manual
  script:
    - .\tests\build_pip.ps1

pip_pyodide:
  stage: build
  tags:
    - bash
    - avx
    - linux
    - docker
  script:
    - ./tests/gitlab-ci/pyodide/build.sh
  when: manual

