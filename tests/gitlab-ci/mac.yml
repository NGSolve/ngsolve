.template_mac: &mac
  tags:
    - m1
    - mac
  before_script:
    - source tests/gitlab-ci/mac/set_vars.sh

mac_build:
  <<: *mac
  stage: build
  script:
    - source tests/gitlab-ci/mac/build.sh

mac_cleanup:
  <<: *mac
  stage: cleanup
  script:
    - rm -rf $ROOT_DIR
  when: always
  allow_failure: true
  needs: ["mac_build"]